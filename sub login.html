<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Login</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        input {
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <h2>Vehicle Login Page</h2>

    <input type="text" id="username" placeholder="Enter Username"><br>
    <input type="password" id="password" placeholder="Enter Password (bike/car)"><br>
    <button onclick="login()">Login</button>

    <script>
        function login() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            // Bike login
            if(user === "user" && pass === "bike") {
                window.location.href = "bike.html";
            }

            // Car login
            else if(user === "user" && pass === "car") {
                window.location.href = "car.html";
            }

            else {
                alert("Invalid Login!");
            }
        }
    </script>

</body>
</html>
