<!DOCTYPE html>
<html>
<head>
    <title>Parking Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px black;
        }

        .free { color: #22c55e; }
        .full { color: #ef4444; }

        .btn {
            padding: 10px 20px;
            margin: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .road {
            width: 80%;
            height: 80px;
            margin: 30px auto;
            background: #334155;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .car {
            position: absolute;
            left: -60px;
            top: 20px;
            font-size: 40px;
            animation: moveCar 5s linear infinite;
        }

        @keyframes moveCar {
            0% { left: -60px; }
            100% { left: 100%; }
        }

        .arrow {
            font-size: 30px;
            margin: 10px;
        }
    </style>
</head>

<body>

<h2>🚗 Smart Parking Dashboard</h2>

<h3 id="vehicleType"></h3>

<!-- 🚗 CAR ROAD -->
<div class="road">
    <div class="car" id="car">🚗</div>
</div>

<!-- 🅿️ SLOT CARDS -->
<div class="container">
    <div class="card">
        <h3>2 Wheeler</h3>
        <p id="slot2W" class="free"></p>
    </div>

    <div class="card">
        <h3>4 Wheeler</h3>
        <p id="slot4W" class="free"></p>
    </div>
</div>

<button class="btn" onclick="enterParking()">Enter Parking</button>

<!-- 🧭 DIRECTIONS -->
<h3>Direction</h3>

<div>
    <span id="left" class="arrow">⬅️</span>
    <span id="straight" class="arrow">⬆️</span>
    <span id="right" class="arrow">➡️</span>
</div>

<script>

// 🚗 VEHICLE TYPE
let type = localStorage.getItem("vehicleType");

if (type === "2W") {
    document.getElementById("vehicleType").innerText = "🚲 Two Wheeler";
} else {
    document.getElementById("vehicleType").innerText = "🚗 Four Wheeler";
}

// 🅿️ SLOTS
let slots = {
    "2W": 5,
    "4W": 5
};

// SHOW SLOTS
function showSlots() {
    document.getElementById("slot2W").innerText = slots["2W"];
    document.getElementById("slot4W").innerText = slots["4W"];
}
showSlots();

// 🚪 ENTRY
function enterParking() {
    if (slots[type] > 0) {
        slots[type]--;
        alert("Slot Allocated ✅");
        showSlots();
        updateDirection();
    } else {
        alert("Parking Full ❌");
    }
}

// 🧭 DIRECTION LOGIC
function updateDirection() {
    let car = document.getElementById("car");

    if (slots["4W"] > slots["2W"]) {
        document.getElementById("straight").style.color = "green";
        car.style.transform = "rotate(0deg)";
    } 
    else if (slots["2W"] > slots["4W"]) {
        document.getElementById("left").style.color = "green";
        car.style.transform = "rotate(-20deg)";
    } 
    else {
        document.getElementById("right").style.color = "green";
        car.style.transform = "rotate(20deg)";
    }
}

</script>

</body>
</html>
