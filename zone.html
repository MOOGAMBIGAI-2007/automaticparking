<!DOCTYPE html>
<html>
<head>
  <style>
    .slot { width: 100px; height: 50px; margin: 5px; text-align: center; line-height: 50px; color: white; }
    .occupied { background-color: red; }
    .free { background-color: green; }
  </style>
</head>
<body>
  <h2>Zone A</h2>
  <div class="slot free">Slot1</div>
  <div class="slot occupied">Slot2</div>
  <div class="slot free">Slot3</div>

  <h2>Zone B</h2>
  <div class="slot free">Slot4</div>
  <div class="slot occupied">Slot5</div>
  <div class="slot free">Slot6</div>
</body>
</html>
